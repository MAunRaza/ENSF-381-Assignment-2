<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Summary</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo.jpeg">
</head>
<body>

  <header>
    <img src="logo.jpeg" alt="Sweet Scoops Logo" width="60" height="60" />
    <h1>Sweet Scoops Ice Cream</h1>
  </header>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="menu_view.html">Menu</a>
  </div>

  <main>
    <div class="main-container">

      <section>
        <h2>Order Summary</h2>

        <table class="summary-table">
          <tr>
            <th>Flavor</th>
            <td>Vanilla Dream</td>
          </tr>
          <tr>
            <th>Type</th>
            <td>Cone</td>
          </tr>
          <tr>
            <th>Toppings</th>
            <td>Sprinkles, Caramel Drizzle</td>
          </tr>
          <tr>
            <th>Price</th>
            <td>$12.00</td>
          </tr>
        </table>

        <div class="btn-row">
          <a class="btn" href="customize_order.html">Edit Order</a>
          <button type="button" class="btn">Confirm Order</button>
        </div>
      </section>

    </div>
  </main>

  <footer>
    <p>© 2026 Sweet Scoops Ice Cream. All rights reserved.</p>
  </footer>

</body>
</html>
