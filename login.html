

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sweet Scoops Ice Cream - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo.jpeg">
</head>

<body>

  <header>
    <img src="logo.jpeg" alt="Sweet Scoops Ice Cream logo" width="50" height="50" />
    <h1>Sweet Scoops Ice Cream</h1>
  </header>

  <div class="navbar">
    <a href="index.html">Home</a>
  </div>

  
  <main class="login-main">
    <div class="main-container">
      <form class="login-form" action="menu_view.html">
        <p>Welcome back! Please log in below.</p>
        <br />

        <label for="username">Username</label>
        <br />
        <input type="text" id="username" name="username" />
        <br /><br />

        <label for="password">Password</label>
        <br />
        <input type="password" id="password" name="password" />
        <br /><br />

        <label>
          <input type="checkbox" />
          Forgot Password?
        </label>
        <br /><br />

        <button type="submit">Login</button>
      </form>
    </div>
  </main>


  <footer>
    &copy; Sweet Scoops Ice Cream 2026
  </footer>
</body>
</html>
