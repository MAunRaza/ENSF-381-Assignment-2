<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweet Scoops Ice Cream - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo.jpeg" />
</head>

<body>
  <header>
    <img src="logo.jpeg" alt="Sweet Scoops Ice Cream logo" width="50" height="50" />
    <h1>Sweet Scoops Ice Cream</h1>
  </header>

  <div class="navbar">
    <a href="index.html">Home</a>
  </div>

  <main class="login-main">
    <div class="main-container">
      <form class="login-form" id="loginForm">
        <p>Welcome Back!</p>

        <label for="username">Username</label>
        <br />
        <input type="text" id="username" name="username" />
        <br /><br />

        <label for="password">Password (Email)</label>
        <br />
        <input type="password" id="password" name="password" />
        <br /><br />

        <label class="checkbox-label">
          <input type="checkbox" />
          Forgot Password
        </label>
        <br /><br />

        <button type="submit">Login</button>
      </form>

      <div id="messageBox" class="message-box"></div>

      <p class="signup-text">
        New user?
        <a href="signup.html" class="signup-link-btn">Create an account</a>
      </p>
    </div>
  </main>

  <footer>
    &copy; Sweet Scoops Ice Cream 2026
  </footer>

  <script>
    const loginForm = document.getElementById("loginForm");
    const messageBox = document.getElementById("messageBox");

    function showMessage(message, type) {
      messageBox.textContent = message;
      messageBox.className = "message-box " + type;
      messageBox.style.display = "block";
    }

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const usernameInput = document.getElementById("username").value.trim();
      const passwordInput = document.getElementById("password").value;

      if (usernameInput === "" || passwordInput === "") {
        showMessage("Please enter both username and password.", "error");
        return;
      }

      try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users");

        if (!response.ok) {
          throw new Error("Failed to fetch user data.");
        }

        const users = await response.json();

        const matchedUser = users.find(function (user) {
          return user.username.toLowerCase() === usernameInput.toLowerCase();
        });

        if (!matchedUser) {
          showMessage("Invalid username.", "error");
          return;
        }

        if (passwordInput !== matchedUser.email) {
          showMessage("Invalid password.", "error");
          return;
        }

        showMessage("Login successful. Redirecting to menu page...", "success");

        setTimeout(function () {
          window.location.href = "menu_view.html";
        }, 2000);

      } catch (error) {
        showMessage("Unable to connect to the server. Please try again later.", "error");
        console.error(error);
      }
    });
  </script>
</body>
</html>
