<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customize Order</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="logo.jpeg">
</head>
<body>

  <header>
    <img src="logo.jpeg" alt="Sweet Scoops Logo" width="60" height="60" />
    <h1>Sweet Scoops Ice Cream</h1>
  </header>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="menu_view.html">Menu</a>
    <a href="customize_order.html">Customize</a>
    <a href="order_summary.html">Order Summary</a>
  </div>

  <main>
    <div class="main-container">

      <section>
        <h2>Customize Your Order</h2>

        <!-- Banner image (still allowed) -->
        <img class="banner" src="Picture2.jpeg" alt="Ice cream banner" />

        <!-- ✅ Timer at the top of main content -->
        <p class="timer">
          Time left: <span id="timer">10:00</span>
        </p>
      </section>

      <section>
        <form id="orderForm">
          <h2>Choose a base flavor:</h2>
          <label><input type="radio" name="baseFlavor" value="Vanilla Dream"> Vanilla Dream</label><br />
          <label><input type="radio" name="baseFlavor" value="Chocolate Bliss"> Chocolate Bliss</label><br />
          <label><input type="radio" name="baseFlavor" value="Strawberry Swirl"> Strawberry Swirl</label><br /><br />

          <h2>Select toppings ($1.50 each):</h2>
          <label><input type="checkbox" name="toppings" value="Sprinkles"> Sprinkles</label><br />
          <label><input type="checkbox" name="toppings" value="Nuts"> Nuts</label><br />
          <label><input type="checkbox" name="toppings" value="Caramel Drizzle"> Caramel Drizzle</label><br />
          <label><input type="checkbox" name="toppings" value="Cookie Crumble"> Cookie Crumble</label><br /><br />

          <!-- ✅ Total price right before Finish Order button -->
          <p class="total">
            Total Price: <span id="totalPrice">$0.00</span>
          </p>

          <button type="submit" class="btn btn-wide">Finish Order</button>
        </form>
      </section>

    </div>
  </main>

  <footer>
    <p>© 2026 Sweet Scoops Ice Cream. All rights reserved.</p>
  </footer>

  <script src="customize.js"></script>
</body>
</html>
